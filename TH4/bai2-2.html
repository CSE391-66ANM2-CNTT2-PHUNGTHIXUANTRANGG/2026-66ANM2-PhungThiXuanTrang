<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>

<style>

body{
font-family: Arial;
padding:20px;
}

input,select,textarea{
display:block;
margin-bottom:6px;
padding:6px;
width:250px;
}

.error{
color:red;
font-size:14px;
}

#noteCount{
font-size:13px;
color:gray;
}

#confirmBox{
border:1px solid #ccc;
padding:15px;
margin-top:20px;
display:none;
background:#f5f5f5;
}

</style>

</head>

<body>

<h2>Đặt hàng</h2>

<form id="orderForm">

<label>Tên sản phẩm</label>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Áo">Áo</option>
<option value="Quần">Quần</option>
<option value="Giày">Giày</option>
</select>
<div class="error" id="productError"></div>


<label>Số lượng</label>
<input type="number" id="quantity">
<div class="error" id="quantityError"></div>


<label>Ngày giao</label>
<input type="date" id="date">
<div class="error" id="dateError"></div>


<label>Địa chỉ giao</label>
<input type="text" id="address">
<div class="error" id="addressError"></div>


<label>Ghi chú</label>
<textarea id="note"></textarea>
<div id="noteCount">0/200</div>
<div class="error" id="noteError"></div>


<label>Phương thức thanh toán </label>

<input type="radio" name="payment" value="COD"> COD
<input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản
<input type="radio" name="payment" value="Ví"> Ví điện tử

<div class="error" id="paymentError"></div>

<br>

<div>
Tổng tiền: <b id="total">0</b> VND
</div>

<br>

<button type="submit">Đặt hàng</button>

</form>


<div id="confirmBox">

<h3>Xác nhận đơn hàng</h3>

<p id="summary"></p>

<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>

</div>

<div id="success"></div>

<script src="bai2-2.js"></script>

</body>
</html>
