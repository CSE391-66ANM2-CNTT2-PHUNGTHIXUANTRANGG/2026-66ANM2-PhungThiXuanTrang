<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>

<style>

body{
font-family: Arial;
padding:20px;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 12px;
}

table{
width:100%;
border-collapse: collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#f0f0f0;
}

.weak{
background:yellow;
}

.stats{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Bảng Điểm Sinh Viên</h2>

<input type="text" id="name" placeholder="Họ tên">
<input type="number" id="score" min="0" max="10" step="0.1">
<button id="addBtn">Thêm</button>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>

</table>

<div class="stats">
Tổng sinh viên: <span id="total">0</span> |
Điểm trung bình: <span id="avg">0</span>
</div>

<script src="bai1-1.js"></script>

</body>
</html>
